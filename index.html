<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clavier de Soumission</title>
<style>
  /* Style Rétro Épuré */
  body {
    font-family: 'MS Sans Serif', 'Segoe UI', sans-serif;
    background: #c0c0c0;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    user-select: none;
    -webkit-user-select: none;
    transition: filter 0.2s;
  }

  body.hidden-screen {
    filter: blur(25px);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 600px;
    padding: 10px;
  }

  .instructions {
    background: #fff;
    border-top: 2px solid #808080;
    border-left: 2px solid #808080;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    padding: 15px;
    font-size: 14px;
    margin-bottom: 20px;
  }

  .warning {
    color: #d00000;
    font-weight: bold;
    margin-top: 10px;
  }

  #inputText {
    width: 100%;
    height: 120px;
    font-size: 24px;
    margin-bottom: 10px;
    padding: 10px;
    box-sizing: border-box;
    background: #fff;
    color: #000;
    border-top: 2px solid #808080;
    border-left: 2px solid #808080;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    resize: none;
    outline: none;
    pointer-events: none;
  }

  #status-msg {
    color: #000080;
    font-weight: bold;
    height: 20px;
    margin-bottom: 15px;
    font-size: 14px;
    text-align: center;
  }

  .keyboard {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 20px;
  }

  .key {
    background: #c0c0c0;
    border-top: 2px solid #fff;
    border-left: 2px solid #fff;
    border-right: 2px solid #808080;
    border-bottom: 2px solid #808080;
    text-align: center;
    font-size: 20px;
    padding: 15px 0;
    cursor: pointer;
    font-weight: bold;
  }

  .key:active {
    border-top: 2px solid #808080;
    border-left: 2px solid #808080;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    padding: 16px 0 14px 1px;
  }

  .key.disabled {
    color: #808080;
    text-shadow: 1px 1px 0px #fff;
    cursor: not-allowed;
  }

  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }

  .button {
    background: #c0c0c0;
    border-top: 2px solid #fff;
    border-left: 2px solid #fff;
    border-right: 2px solid #808080;
    border-bottom: 2px solid #808080;
    padding: 12px 15px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    font-family: 'MS Sans Serif', sans-serif;
  }

  .button:active {
    border-top: 2px solid #808080;
    border-left: 2px solid #808080;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
  }

  .button:disabled {
    color: #808080;
    text-shadow: 1px 1px 0px #fff;
    cursor: not-allowed;
  }

  .btn-danger {
    color: #d00000;
  }
</style>
</head>
<body>

<div class="container">
  
  <div class="instructions">
    <strong>Protocoles requis :</strong><br>
    - Minimum 30 mots.<br>
    - Inclure exactement : "je vous vénère mon maître"<br>
    <div class="warning">⚠️ Règle stricte : Toute tentative de correction (⌫) effacera l'intégralité du message. La frappe est bloquée pendant l'apprentissage. La traduction n'apparaît qu'à la copie.</div>
  </div>

  <textarea id="inputText" readonly tabindex="-1" placeholder="utiliser mon alphabet personelle"></textarea>
  
  <div id="status-msg">Prêt.</div>

  <button class="button" id="revealBtn" style="width: 100%; margin-bottom: 15px;" onclick="triggerReveal()">👁️ Démasquer l'alphabet (20s)</button>

  <div class="keyboard" id="keyboard"></div>

  <div class="buttons">
    <button class="button" style="flex-grow: 1;" onclick="addChar(' ')">Espace (␣)</button>
    <button class="button btn-danger" onclick="nukeText()">Corriger (⌫)</button>
    <button class="button" style="width: 100%; margin-top: 5px;" onclick="submitAndCopy()">Valider & Copier le Message</button>
  </div>

</div>

<script>
  // --- ANTI-CAPTURE & BLOCAGE PHYSIQUE ---
  window.addEventListener('blur', () => document.body.classList.add('hidden-screen'));
  window.addEventListener('focus', () => document.body.classList.remove('hidden-screen'));

  document.addEventListener('keydown', function(event) {
    if (event.key === 'PrintScreen') {
        navigator.clipboard.writeText('');
        alert("Triche détectée : Capture d'écran bloquée.");
    }
    const allowedKeys = ['F12', 'F5'];
    if (!allowedKeys.includes(event.key) && !(event.ctrlKey && event.key === 'r')) {
        event.preventDefault();
        event.stopPropagation();
    }
  }, true);

  document.addEventListener('contextmenu', e => e.preventDefault());

  // --- ALPHABET (Ordre alphabétique normal + accents) ---
  const sauvakAlphabet = [
    { char: 'a', sym: 'ᚨ' }, { char: 'b', sym: 'ᛒ' }, { char: 'c', sym: 'ᚳ' },
    { char: 'd', sym: 'ᛞ' }, { char: 'e', sym: 'ᛖ' }, { char: 'f', sym: 'ᚠ' },
    { char: 'g', sym: 'ᚷ' }, { char: 'h', sym: 'ᚺ' }, { char: 'i', sym: 'ᛁ' },
    { char: 'j', sym: 'ᛃ' }, { char: 'k', sym: 'ᚴ' }, { char: 'l', sym: 'ᛚ' },
    { char: 'm', sym: 'ᛗ' }, { char: 'n', sym: 'ᚾ' }, { char: 'o', sym: 'ᛟ' },
    { char: 'p', sym: 'ᛈ' }, { char: 'q', sym: 'ᛩ' }, { char: 'r', sym: 'ᚱ' },
    { char: 's', sym: 'ᛋ' }, { char: 't', sym: 'ᛏ' }, { char: 'u', sym: 'ᚢ' },
    { char: 'v', sym: 'ᚡ' }, { char: 'w', sym: 'ᚹ' }, { char: 'x', sym: 'ᛪ' },
    { char: 'y', sym: 'ᛇ' }, { char: 'z', sym: 'ᛉ' },
    { char: 'é', sym: '◬' }, { char: 'è', sym: '◭' }, { char: 'à', sym: '◮' },
    { char: 'î', sym: '◫' }, { char: 'ç', sym: '◨' }, { char: '.', sym: '.' }, 
    { char: ',', sym: ',' }, { char: "'", sym: "'" }, { char: '?', sym: '?' }
  ];

  const input = document.getElementById('inputText');
  const keyboard = document.getElementById('keyboard');
  const statusMsg = document.getElementById('status-msg');
  const revealBtn = document.getElementById('revealBtn');
  let isRevealed = false;

  // Dictionnaire inversé pour la traduction
  const symToChar = {};
  sauvakAlphabet.forEach(item => symToChar[item.sym] = item.char);

  // Génération du clavier
  sauvakAlphabet.forEach(item => {
    const key = document.createElement('div');
    key.className = 'key';
    key.textContent = item.sym;
    key.dataset.sym = item.sym;
    key.dataset.char = item.char;
    key.onclick = () => addChar(item.sym);
    keyboard.appendChild(key);
  });

  // --- LOGIQUE DE FRAPPE ---
  function addChar(char) {
    if (isRevealed) return; // BLOCAGE PENDANT LA RÉVÉLATION
    input.value += char;
    statusMsg.innerText = "";
    statusMsg.style.color = "#000080";
  }

  // --- ANTI-CORRECTION (Supprime TOUT) ---
  function nukeText() {
    if (input.value.length === 0) return;
    input.value = "";
    statusMsg.style.color = "#d00000";
    statusMsg.innerText = "Correction interdite. Le message a été entièrement détruit.";
  }

  // --- RÉVÉLATION (1h cooldown, fige le clavier) ---
  const COOLDOWN_MS = 60 * 60 * 1000;
  
  function updateRevealButton() {
    const lastReveal = localStorage.getItem('lastRevealTimeWin95');
    if (!lastReveal) return;

    const timePassed = Date.now() - parseInt(lastReveal);
    if (timePassed < COOLDOWN_MS) {
        revealBtn.disabled = true;
        const minLeft = Math.ceil((COOLDOWN_MS - timePassed) / 60000);
        revealBtn.innerText = `Apprentissage bloqué (${minLeft} min)`;
    } else {
        revealBtn.disabled = false;
        revealBtn.innerText = "👁️ Démasquer l'alphabet (20s)";
    }
  }

  updateRevealButton();
  setInterval(updateRevealButton, 60000);

  function triggerReveal() {
    localStorage.setItem('lastRevealTimeWin95', Date.now());
    updateRevealButton();
    isRevealed = true; // Empêche d'écrire
    
    const keys = document.querySelectorAll('.keyboard .key');
    keys.forEach(k => {
        k.textContent = k.dataset.char;
        k.classList.add('disabled');
    });

    statusMsg.style.color = "#d00000";
    statusMsg.innerText = "Mémorisez. Frappe bloquée pendant 20s.";

    setTimeout(() => {
        keys.forEach(k => {
            k.textContent = k.dataset.sym;
            k.classList.remove('disabled');
        });
        isRevealed = false; // Réactive l'écriture
        statusMsg.style.color = "#000080";
        statusMsg.innerText = "Le clavier est à nouveau actif.";
    }, 20000);
  }

  // --- TRADUCTION & VALIDATION ---
  function translateToFrench(text) {
    let result = '';
    for (let char of text) {
        result += symToChar[char] || char;
    }
    return result;
  }

  function submitAndCopy() {
    if (input.value.length === 0) return;

    const symText = input.value;
    const frText = translateToFrench(symText);
    const wordCount = frText.trim().split(/\s+/).filter(w => w.length > 0).length;

    // Vérifications
    if (wordCount < 30) {
        nukeText();
        statusMsg.innerText = `Refusé. Manque de mots (${wordCount}/30). Message détruit.`;
        return;
    }

    if (!frText.includes("je vous vénère mon maître")) {
        nukeText();
        statusMsg.innerText = "Refusé. Phrase d'allégeance absente/fausse. Message détruit.";
        return;
    }

    // Création du bloc final avec la traduction
    const finalMessage = `${symText}\n\n--- TRADUCTION ---\n${frText}`;

    // Copie et Auto-Destruction immédiate
    navigator.clipboard.writeText(finalMessage).then(() => {
        input.value = ""; // AUTO-DESTRUCTION SUR L'ÉCRAN
        statusMsg.style.color = "#008000";
        statusMsg.innerText = "Valide. Message copié avec sa traduction. Il s'est effacé de l'écran.";
    });
  }
</script>
</body>
</html>
