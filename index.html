<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clavier de Soumission</title>
<style>
  /* Style Rétro Épuré */
  body {
    font-family: 'MS Sans Serif', 'Segoe UI', sans-serif;
    background: #c0c0c0;
    margin: 0;
    padding: 10px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    user-select: none;
    -webkit-user-select: none;
    transition: filter 0.2s;
    height: 100vh;
    overflow: hidden; 
  }

  body.hidden-screen {
    filter: blur(25px);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    height: 98vh; 
  }

  .instructions {
    background: #fff;
    border-top: 2px solid #808080;
    border-left: 2px solid #808080;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    padding: 10px; 
    font-size: 13px;
    margin-bottom: 10px;
    flex-shrink: 0; 
  }

  .warning {
    color: #d00000;
    font-weight: bold;
    margin-top: 5px;
  }

  /* Tableau de bord des conditions */
  .checklist {
    background: #fff;
    border-top: 2px solid #808080;
    border-left: 2px solid #808080;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    padding: 10px;
    margin-bottom: 10px;
    font-size: 14px;
    font-weight: bold;
    flex-shrink: 0;
  }

  .check-item {
    margin: 4px 0;
    display: flex;
    align-items: center;
  }

  .dot {
    margin-right: 8px;
    font-size: 16px;
  }

  .textarea-wrapper {
    flex-grow: 1; 
    min-height: 80px;
    max-height: 200px; 
    margin-bottom: 10px;
    background: #fff;
    border-top: 2px solid #808080;
    border-left: 2px solid #808080;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    display: flex;
    flex-direction: column;
  }

  #inputText {
    width: 100%;
    height: 100%;
    font-size: 22px; 
    padding: 10px;
    box-sizing: border-box;
    background: transparent;
    color: #000;
    border: none;
    resize: none;
    outline: none;
    pointer-events: none;
    overflow-y: auto; 
  }

  #status-msg {
    color: #000080;
    font-weight: bold;
    height: 40px; 
    margin-bottom: 5px;
    font-size: 13px;
    text-align: center;
    flex-shrink: 0;
  }

  .reveal-wrapper {
    flex-shrink: 0;
  }

  .keyboard {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 15px;
    flex-shrink: 0; 
  }

  .key {
    background: #c0c0c0;
    border-top: 2px solid #fff;
    border-left: 2px solid #fff;
    border-right: 2px solid #808080;
    border-bottom: 2px solid #808080;
    text-align: center;
    font-size: 20px;
    padding: 12px 0; 
    cursor: pointer;
    font-weight: bold;
  }

  .key:active {
    border-top: 2px solid #808080;
    border-left: 2px solid #808080;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    padding: 13px 0 11px 1px;
  }

  .key.disabled {
    color: #808080;
    text-shadow: 1px 1px 0px #fff;
    cursor: not-allowed;
  }

  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    flex-shrink: 0;
  }

  .button {
    background: #c0c0c0;
    border-top: 2px solid #fff;
    border-left: 2px solid #fff;
    border-right: 2px solid #808080;
    border-bottom: 2px solid #808080;
    padding: 10px 15px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    font-family: 'MS Sans Serif', sans-serif;
  }

  .button:active {
    border-top: 2px solid #808080;
    border-left: 2px solid #808080;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
  }

  .button:disabled {
    color: #808080;
    text-shadow: 1px 1px 0px #fff;
    cursor: not-allowed;
  }

  .btn-danger {
    color: #d00000;
  }
</style>
</head>
<body>

<div class="container">
  
  <div class="instructions">
    <strong>Règle stricte :</strong> Toute correction (⌫) efface le message complet.
    <div class="warning">Frappe bloquée pendant l'apprentissage. La traduction n'apparaît qu'à la copie.</div>
  </div>

  <!-- NOUVEAU : Suivi des conditions en direct -->
  <div class="checklist">
    <div class="check-item">
      <span class="dot" id="dot-words">🔴</span> Minimum 30 mots (<span id="word-count">0</span>/30)
    </div>
    <div class="check-item">
      <span class="dot" id="dot-phrase">🔴</span> Phrase d'allégeance exacte : "je vous vénère mon maître"
    </div>
  </div>

  <div class="textarea-wrapper">
    <textarea id="inputText" readonly tabindex="-1" placeholder="utiliser mon alphabet personelle"></textarea>
  </div>
  
  <div id="status-msg">Prêt.</div>

  <div class="reveal-wrapper">
    <button class="button" id="revealBtn" style="width: 100%; margin-bottom: 10px;" onclick="triggerReveal()">👁️ Démasquer l'alphabet (20s)</button>
  </div>

  <div class="keyboard" id="keyboard"></div>

  <div class="buttons">
    <button class="button" style="flex-grow: 1;" onclick="addChar(' ')">Espace (␣)</button>
    <button class="button btn-danger" onclick="nukeText('Correction interdite. Le message a été entièrement détruit.')">Corriger (⌫)</button>
    <button class="button" style="width: 100%;" onclick="submitAndCopy()">Valider & Copier le Message</button>
  </div>

</div>

<script>
  // --- ANTI-CAPTURE & BLOCAGE PHYSIQUE ---
  window.addEventListener('blur', () => document.body.classList.add('hidden-screen'));
  window.addEventListener('focus', () => document.body.classList.remove('hidden-screen'));

  document.addEventListener('keydown', function(event) {
    if (event.key === 'PrintScreen') {
        navigator.clipboard.writeText('');
        alert("Triche détectée : Capture d'écran bloquée.");
    }
    const allowedKeys = ['F12', 'F5'];
    if (!allowedKeys.includes(event.key) && !(event.ctrlKey && event.key === 'r')) {
        event.preventDefault();
        event.stopPropagation();
    }
  }, true);

  document.addEventListener('contextmenu', e => e.preventDefault());

  // --- ALPHABET (Ordre alphabétique normal + accents) ---
  const sauvakAlphabet = [
    { char: 'a', sym: 'ᚨ' }, { char: 'b', sym: 'ᛒ' }, { char: 'c', sym: 'ᚳ' },
    { char: 'd', sym: 'ᛞ' }, { char: 'e', sym: 'ᛖ' }, { char: 'f', sym: 'ᚠ' },
    { char: 'g', sym: 'ᚷ' }, { char: 'h', sym: 'ᚺ' }, { char: 'i', sym: 'ᛁ' },
    { char: 'j', sym: 'ᛃ' }, { char: 'k', sym: 'ᚴ' }, { char: 'l', sym: 'ᛚ' },
    { char: 'm', sym: 'ᛗ' }, { char: 'n', sym: 'ᚾ' }, { char: 'o', sym: 'ᛟ' },
    { char: 'p', sym: 'ᛈ' }, { char: 'q', sym: 'ᛩ' }, { char: 'r', sym: 'ᚱ' },
    { char: 's', sym: 'ᛋ' }, { char: 't', sym: 'ᛏ' }, { char: 'u', sym: 'ᚢ' },
    { char: 'v', sym: 'ᚡ' }, { char: 'w', sym: 'ᚹ' }, { char: 'x', sym: 'ᛪ' },
    { char: 'y', sym: 'ᛇ' }, { char: 'z', sym: 'ᛉ' },
    { char: 'é', sym: '◬' }, { char: 'è', sym: '◭' }, { char: 'à', sym: '◮' },
    { char: 'î', sym: '◫' }, { char: 'ç', sym: '◨' }, { char: '.', sym: '.' }, 
    { char: ',', sym: ',' }, { char: "'", sym: "'" }, { char: '?', sym: '?' }
  ];

  const input = document.getElementById('inputText');
  const keyboard = document.getElementById('keyboard');
  const statusMsg = document.getElementById('status-msg');
  const revealBtn = document.getElementById('revealBtn');
  let isRevealed = false;

  const symToChar = {};
  sauvakAlphabet.forEach(item => symToChar[item.sym] = item.char);

  sauvakAlphabet.forEach(item => {
    const key = document.createElement('div');
    key.className = 'key';
    key.textContent = item.sym;
    key.dataset.sym = item.sym;
    key.dataset.char = item.char;
    key.onclick = () => addChar(item.sym);
    keyboard.appendChild(key);
  });

  // --- ANALYSE EN TEMPS RÉEL (NOUVEAU) ---
  function updateChecklist() {
    const frText = translateToFrench(input.value);
    
    // Vérification des mots
    const words = frText.trim().replace(/[.,'?]/g, ' ').split(/\s+/).filter(w => w.length > 0);
    const wordCount = words.length;
    document.getElementById('word-count').innerText = wordCount;
    
    if (wordCount >= 30) {
        document.getElementById('dot-words').innerText = '🟢';
    } else {
        document.getElementById('dot-words').innerText = '🔴';
    }

    // Vérification de la phrase
    const targetPhrase = "je vous vénère mon maître";
    if (frText.includes(targetPhrase)) {
        document.getElementById('dot-phrase').innerText = '🟢';
    } else {
        document.getElementById('dot-phrase').innerText = '🔴';
    }
  }

  // --- LOGIQUE DE FRAPPE ---
  function addChar(char) {
    if (isRevealed) return; 
    input.value += char;
    statusMsg.innerText = "";
    statusMsg.style.color = "#000080";
    input.scrollTop = input.scrollHeight;
    
    // Met à jour les points verts
    updateChecklist();
  }

  // Fonction de destruction
  function nukeText(reasonMsg) {
    if (input.value.length === 0) return;
    input.value = "";
    statusMsg.style.color = "#d00000";
    statusMsg.innerHTML = reasonMsg;
    
    // Remet les points au rouge
    updateChecklist();
  }

  // --- GESTION DE LA RÉVÉLATION ---
  const COOLDOWN_MS = 60 * 60 * 1000;
  
  function updateRevealButton() {
    const lastReveal = localStorage.getItem('lastRevealTimeWin95');
    if (!lastReveal) return;

    const timePassed = Date.now() - parseInt(lastReveal);
    if (timePassed < COOLDOWN_MS) {
        revealBtn.disabled = true;
        const minLeft = Math.ceil((COOLDOWN_MS - timePassed) / 60000);
        revealBtn.innerText = `Apprentissage bloqué (${minLeft} min)`;
    } else {
        revealBtn.disabled = false;
        revealBtn.innerText = "👁️ Démasquer l'alphabet (20s)";
    }
  }

  updateRevealButton();
  setInterval(updateRevealButton, 60000);

  function triggerReveal() {
    localStorage.setItem('lastRevealTimeWin95', Date.now());
    updateRevealButton();
    isRevealed = true; 
    
    const keys = document.querySelectorAll('.keyboard .key');
    keys.forEach(k => {
        k.textContent = k.dataset.char;
        k.classList.add('disabled');
    });

    statusMsg.style.color = "#d00000";
    statusMsg.innerText = "Mémorisez. Frappe bloquée pendant 20s.";

    setTimeout(() => {
        keys.forEach(k => {
            k.textContent = k.dataset.sym;
            k.classList.remove('disabled');
        });
        isRevealed = false; 
        statusMsg.style.color = "#000080";
        statusMsg.innerText = "Le clavier est à nouveau actif.";
    }, 20000);
  }

  function translateToFrench(text) {
    let result = '';
    for (let char of text) {
        result += symToChar[char] || char;
    }
    return result;
  }

  // --- VALIDATION FINALE ---
  function submitAndCopy() {
    if (input.value.length === 0) return;

    const frText = translateToFrench(input.value);
    const words = frText.trim().replace(/[.,'?]/g, ' ').split(/\s+/).filter(w => w.length > 0);
    const wordCount = words.length;
    const targetPhrase = "je vous vénère mon maître";

    // Re-vérification de sécurité au cas où
    if (wordCount < 30) {
        nukeText(`❌ <b>Refusé :</b> Tous les points verts ne sont pas allumés (Mots : ${wordCount}/30).`);
        return;
    }

    if (!frText.includes(targetPhrase)) {
        const textSansAccents = frText.replace(/[éè]/g, 'e').replace(/[î]/g, 'i').replace(/[à]/g, 'a');
        const targetSansAccents = "je vous venere mon maitre";
        
        if (textSansAccents.includes(targetSansAccents)) {
            nukeText(`❌ <b>Refusé :</b> Faute d'accentuation ! Vous n'avez pas de point vert.`);
        } else {
            nukeText(`❌ <b>Refusé :</b> La phrase est mal orthographiée. Pas de point vert.`);
        }
        return;
    }

    // Succès
    const finalMessage = `${input.value}\n\n--- TRADUCTION ---\n${frText}`;

    navigator.clipboard.writeText(finalMessage).then(() => {
        input.value = ""; 
        updateChecklist(); // Remet les compteurs à zéro
        statusMsg.style.color = "#008000";
        statusMsg.innerText = "✅ Valide. Message copié avec sa traduction. L'écran a été purgé.";
    });
  }
</script>
</body>
</html>
